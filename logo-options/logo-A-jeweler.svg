<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2e2e2e"/>
      <stop offset="100%" stop-color="#121212"/>
    </radialGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c2847"/>
      <stop offset="55%" stop-color="#7c1f36"/>
      <stop offset="100%" stop-color="#521022"/>
    </linearGradient>
    <linearGradient id="crownShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pinkStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fadfe4"/>
      <stop offset="100%" stop-color="#cf94a0"/>
    </linearGradient>
    <radialGradient id="goldBead" cx="32%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#f8dd94"/>
      <stop offset="45%" stop-color="#c9a064"/>
      <stop offset="100%" stop-color="#7a5418"/>
    </radialGradient>
    <linearGradient id="pinkBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fadee4"/>
      <stop offset="55%" stop-color="#f0c6cf"/>
      <stop offset="100%" stop-color="#d09ba6"/>
    </linearGradient>
    <linearGradient id="midBar" x1="0" y1="0" x2="0" y2="1">
