  </g>
  <rect x="164" y="282" width="184" height="26" rx="13" fill="url(#midBar)" opacity="0.92"/>
  <rect x="184" y="318" width="144" height="23" rx="11.5" fill="url(#darkBar)" opacity="0.82"/>

