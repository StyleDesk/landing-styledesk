<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#2a0a14"/>
      <stop offset="100%" stop-color="#040204"/>
    </radialGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a82c4e"/>
      <stop offset="100%" stop-color="#6c1828"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fde7a8"/>
      <stop offset="55%" stop-color="#d8a868"/>
      <stop offset="100%" stop-color="#a87020"/>
    </radialGradient>
    <filter id="goldGlowFilter" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="10" result="b1"/>
      <feGaussianBlur stdDeviation="4" in="SourceGraphic" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pinkGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <path d="M143 235 L143 168 L194 204 L256 122 L318 204 L369 168 L369 235 Z" fill="url(#crown)" stroke="#fadfe4" stroke-width="5" stroke-linejoin="round" filter="url(#pinkGlowFilter)"/>

  <rect x="143" y="240" width="226" height="30" rx="15" fill="#f0c6cf" filter="url(#pinkGlowFilter)"/>
  <rect x="164" y="282" width="184" height="26" rx="13" fill="#9a7a80" opacity="0.9"/>
  <rect x="184" y="318" width="144" height="23" rx="11.5" fill="#7a5a60" opacity="0.78"/>

  <g filter="url(#goldGlowFilter)">
    <circle cx="256" cy="122" r="18" fill="url(#goldGlow)"/>
    <circle cx="143" cy="168" r="18" fill="url(#goldGlow)"/>
    <circle cx="369" cy="168" r="18" fill="url(#goldGlow)"/>
  </g>
</svg>
