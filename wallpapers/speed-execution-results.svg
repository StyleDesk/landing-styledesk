<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796" role="img" aria-label="Speed Execution Results wallpaper">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a0018"/>
      <stop offset="55%" stop-color="#2a0012"/>
      <stop offset="100%" stop-color="#1a000b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c6cf"/>
      <stop offset="50%" stop-color="#c9a064"/>
      <stop offset="100%" stop-color="#f0c6cf"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#c9a064" stop-opacity="0.2"/>
      <stop offset="55%" stop-color="#7c1f36" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a064" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg)"/>
  <rect width="1290" height="2796" fill="url(#glow)"/>

  <text x="645" y="1180" font-family="'Helvetica Neue', 'Inter', -apple-system, 'SF Pro Display', sans-serif" font-size="140" font-weight="200" fill="#ffffff" text-anchor="middle" letter-spacing="-1">Speed.</text>

  <!-- premium gold divider 1 -->
  <line x1="520" y1="1242" x2="635" y2="1242" stroke="#c9a064" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="645" cy="1242" r="3" fill="#c9a064" fill-opacity="0.85"/>
  <line x1="655" y1="1242" x2="770" y2="1242" stroke="#c9a064" stroke-opacity="0.5" stroke-width="1.5"/>

  <text x="645" y="1408" font-family="'Helvetica Neue', 'Inter', -apple-system, 'SF Pro Display', sans-serif" font-size="190" font-weight="700" font-style="italic" fill="url(#gold)" text-anchor="middle" letter-spacing="-2">Execution.</text>

  <!-- premium gold divider 2 -->
  <line x1="520" y1="1495" x2="635" y2="1495" stroke="#c9a064" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="645" cy="1495" r="3" fill="#c9a064" fill-opacity="0.85"/>
  <line x1="655" y1="1495" x2="770" y2="1495" stroke="#c9a064" stroke-opacity="0.5" stroke-width="1.5"/>

  <text x="645" y="1640" font-family="'Helvetica Neue', 'Inter', -apple-system, 'SF Pro Display', sans-serif" font-size="140" font-weight="200" fill="#ffffff" text-anchor="middle" letter-spacing="-1">Results.</text>
