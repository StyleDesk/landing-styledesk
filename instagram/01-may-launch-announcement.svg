<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img" aria-label="StyleDesk launches May 2026 — the wait is over">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a0018"/>
      <stop offset="55%" stop-color="#2a0012"/>
      <stop offset="100%" stop-color="#1a000b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c6cf"/>
      <stop offset="50%" stop-color="#c9a064"/>
      <stop offset="100%" stop-color="#f0c6cf"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c9a064" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7c1f36" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a064" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>

  <!-- eyebrow: moderate tracking so letters don't drift apart -->
  <text x="540" y="210" font-family="'Helvetica Neue', 'Inter', -apple-system, 'SF Pro Display', sans-serif" font-size="20" font-weight="300" letter-spacing="4" fill="#c9a064" text-anchor="middle">LAUNCHING · MAY 2026</text>

  <!-- hero: matched size, weight + color contrast, neutral tracking -->
  <text x="540" y="580" font-family="'Helvetica Neue', 'Inter', -apple-system, 'SF Pro Display', sans-serif" font-size="160" font-weight="200" fill="#ffffff" text-anchor="middle" letter-spacing="-1">The wait</text>
  <text x="540" y="790" font-family="'Helvetica Neue', 'Inter', -apple-system, 'SF Pro Display', sans-serif" font-size="160" font-weight="500" fill="url(#gold)" text-anchor="middle" letter-spacing="-2">is over.</text>

  <!-- sub: airy, paired two-line -->
  <text x="540" y="970" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-size="28" font-weight="300" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="0.5">The only AI receptionist</text>
  <text x="540" y="1015" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-size="30" font-weight="500" fill="#ffffff" fill-opacity="0.92" text-anchor="middle" letter-spacing="0.3">built for barbers and nail techs.</text>

  <!-- ornamental divider -->
  <line x1="470" y1="1135" x2="535" y2="1135" stroke="#c9a064" stroke-opacity="0.45"/>
  <circle cx="540" cy="1135" r="3" fill="#c9a064" fill-opacity="0.8"/>
  <line x1="545" y1="1135" x2="610" y2="1135" stroke="#c9a064" stroke-opacity="0.45"/>

  <!-- url -->
  <text x="540" y="1240" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-size="22" font-weight="300" fill="#c9a064" text-anchor="middle" letter-spacing="8">STYLEDESK.AI</text>

  <!-- decorative dots -->
  <circle cx="200" cy="260" r="2" fill="#c9a064" fill-opacity="0.5"/>
  <circle cx="880" cy="320" r="2" fill="#f0c6cf" fill-opacity="0.4"/>
  <circle cx="160" cy="900" r="2" fill="#c9a064" fill-opacity="0.4"/>
  <circle cx="920" cy="1060" r="2" fill="#f0c6cf" fill-opacity="0.35"/>
</svg>
