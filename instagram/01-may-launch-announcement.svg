<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img" aria-label="StyleDesk launches May 2026 — the wait is over">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a0018"/>
      <stop offset="55%" stop-color="#2a0012"/>
      <stop offset="100%" stop-color="#1a000b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c6cf"/>
      <stop offset="50%" stop-color="#c9a064"/>
      <stop offset="100%" stop-color="#f0c6cf"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c9a064" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7c1f36" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a064" stop-opacity="0"/>
    </radialGradient>
    <!-- soft glow around glitter shapes (matches .p.glitter box-shadow on the site) -->
    <filter id="sparkle" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>

  <!-- eyebrow: moderate tracking so letters don't drift apart -->
  <text x="540" y="210" font-family="'Helvetica Neue', 'Inter', -apple-system, 'SF Pro Display', sans-serif" font-size="20" font-weight="300" letter-spacing="4" fill="#c9a064" text-anchor="middle">LAUNCHING · MAY 2026</text>

  <!-- hero: single line, weight + color contrast -->
  <text x="540" y="685" font-family="'Helvetica Neue', 'Inter', -apple-system, 'SF Pro Display', sans-serif" font-size="105" text-anchor="middle" letter-spacing="-1"><tspan font-weight="200" fill="#ffffff">The wait </tspan><tspan font-weight="500" fill="url(#gold)">is over.</tspan></text>

  <!-- sub: airy, paired two-line -->
  <text x="540" y="970" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-size="28" font-weight="300" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="0.5">The only AI receptionist</text>
  <text x="540" y="1015" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-size="30" font-weight="500" fill="#ffffff" fill-opacity="0.92" text-anchor="middle" letter-spacing="0.3">built for barbers and nail techs.</text>

  <!-- ornamental divider -->
  <line x1="470" y1="1135" x2="535" y2="1135" stroke="#c9a064" stroke-opacity="0.45"/>
  <circle cx="540" cy="1135" r="3" fill="#c9a064" fill-opacity="0.8"/>
  <line x1="545" y1="1135" x2="610" y2="1135" stroke="#c9a064" stroke-opacity="0.45"/>

  <!-- url -->
  <text x="540" y="1240" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-size="22" font-weight="300" fill="#c9a064" text-anchor="middle" letter-spacing="8">STYLEDESK.AI</text>

  <!-- PARTICLES: landing-page-style gold/pink/white dots + diamond glitter -->
  <!-- round dots -->
  <circle cx="90" cy="130" r="1.8" fill="#c9a064" opacity="0.55"/>
  <circle cx="215" cy="90" r="1.4" fill="#f0c6cf" opacity="0.45"/>
  <circle cx="320" cy="165" r="1.3" fill="#ffffff" opacity="0.35"/>
  <circle cx="60" cy="285" r="1.6" fill="#c9a064" opacity="0.5"/>
  <circle cx="145" cy="360" r="1.2" fill="#f0c6cf" opacity="0.4"/>
  <circle cx="100" cy="520" r="1.5" fill="#ffffff" opacity="0.35"/>
  <circle cx="40" cy="640" r="1.8" fill="#c9a064" opacity="0.5"/>
  <circle cx="170" cy="780" r="1.3" fill="#f0c6cf" opacity="0.4"/>
  <circle cx="65" cy="880" r="1.5" fill="#c9a064" opacity="0.45"/>
  <circle cx="130" cy="1080" r="1.4" fill="#f0c6cf" opacity="0.4"/>
  <circle cx="200" cy="1180" r="1.2" fill="#ffffff" opacity="0.3"/>
  <circle cx="75" cy="1260" r="1.6" fill="#c9a064" opacity="0.5"/>

  <circle cx="735" cy="105" r="1.4" fill="#f0c6cf" opacity="0.45"/>
  <circle cx="870" cy="165" r="1.2" fill="#ffffff" opacity="0.35"/>
  <circle cx="995" cy="90" r="1.5" fill="#c9a064" opacity="0.5"/>
  <circle cx="1010" cy="270" r="1.3" fill="#f0c6cf" opacity="0.4"/>
  <circle cx="920" cy="400" r="1.5" fill="#c9a064" opacity="0.45"/>
  <circle cx="1030" cy="560" r="1.2" fill="#ffffff" opacity="0.3"/>
  <circle cx="955" cy="730" r="1.4" fill="#f0c6cf" opacity="0.4"/>
  <circle cx="1005" cy="860" r="1.6" fill="#c9a064" opacity="0.5"/>
  <circle cx="870" cy="1100" r="1.3" fill="#f0c6cf" opacity="0.4"/>
  <circle cx="970" cy="1210" r="1.5" fill="#c9a064" opacity="0.5"/>
  <circle cx="1020" cy="1300" r="1.2" fill="#ffffff" opacity="0.35"/>

  <!-- diamond glitter with soft glow -->
  <g filter="url(#sparkle)">
    <g transform="translate(155,60) rotate(45)"><rect x="-2" y="-2" width="4" height="4" fill="#c9a064" opacity="0.7"/></g>
    <g transform="translate(260,215) rotate(45)"><rect x="-1.5" y="-1.5" width="3" height="3" fill="#f0c6cf" opacity="0.6"/></g>
    <g transform="translate(405,90) rotate(45)"><rect x="-2" y="-2" width="4" height="4" fill="#c9a064" opacity="0.65"/></g>
    <g transform="translate(195,450) rotate(45)"><rect x="-2.5" y="-2.5" width="5" height="5" fill="#c9a064" opacity="0.6"/></g>
    <g transform="translate(80,760) rotate(45)"><rect x="-1.8" y="-1.8" width="3.6" height="3.6" fill="#f0c6cf" opacity="0.55"/></g>
    <g transform="translate(240,860) rotate(45)"><rect x="-2" y="-2" width="4" height="4" fill="#c9a064" opacity="0.6"/></g>
    <g transform="translate(115,1170) rotate(45)"><rect x="-2.2" y="-2.2" width="4.4" height="4.4" fill="#c9a064" opacity="0.65"/></g>
    <g transform="translate(380,1290) rotate(45)"><rect x="-1.8" y="-1.8" width="3.6" height="3.6" fill="#f0c6cf" opacity="0.55"/></g>

    <g transform="translate(640,65) rotate(45)"><rect x="-2" y="-2" width="4" height="4" fill="#c9a064" opacity="0.6"/></g>
    <g transform="translate(800,220) rotate(45)"><rect x="-1.5" y="-1.5" width="3" height="3" fill="#f0c6cf" opacity="0.55"/></g>
    <g transform="translate(935,295) rotate(45)"><rect x="-2.3" y="-2.3" width="4.6" height="4.6" fill="#c9a064" opacity="0.7"/></g>
    <g transform="translate(895,520) rotate(45)"><rect x="-2" y="-2" width="4" height="4" fill="#f0c6cf" opacity="0.55"/></g>
    <g transform="translate(1020,670) rotate(45)"><rect x="-1.8" y="-1.8" width="3.6" height="3.6" fill="#c9a064" opacity="0.6"/></g>
    <g transform="translate(880,830) rotate(45)"><rect x="-2" y="-2" width="4" height="4" fill="#c9a064" opacity="0.65"/></g>
    <g transform="translate(960,1070) rotate(45)"><rect x="-2.2" y="-2.2" width="4.4" height="4.4" fill="#f0c6cf" opacity="0.6"/></g>
    <g transform="translate(820,1195) rotate(45)"><rect x="-1.8" y="-1.8" width="3.6" height="3.6" fill="#c9a064" opacity="0.6"/></g>
    <g transform="translate(700,1315) rotate(45)"><rect x="-2" y="-2" width="4" height="4" fill="#c9a064" opacity="0.55"/></g>
  </g>

  <!-- a few twinklers for life in the browser preview -->
  <circle cx="340" cy="290" r="1.8" fill="#f0c6cf" opacity="0.5">
    <animate attributeName="opacity" values="0.1;0.7;0.1" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="420" r="1.6" fill="#c9a064" opacity="0.45">
    <animate attributeName="opacity" values="0.05;0.65;0.05" dur="5.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="1050" r="1.5" fill="#c9a064" opacity="0.4">
    <animate attributeName="opacity" values="0.08;0.6;0.08" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="830" cy="960" r="1.7" fill="#f0c6cf" opacity="0.45">
    <animate attributeName="opacity" values="0.1;0.7;0.1" dur="4.6s" repeatCount="indefinite"/>
  </circle>
</svg>
