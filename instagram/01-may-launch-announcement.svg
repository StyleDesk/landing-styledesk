<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img" aria-label="StyleDesk launches May 2026">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a0018"/>
      <stop offset="55%" stop-color="#2a0012"/>
      <stop offset="100%" stop-color="#1a000b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c6cf"/>
      <stop offset="50%" stop-color="#c9a064"/>
      <stop offset="100%" stop-color="#f0c6cf"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#c9a064" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7c1f36" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a064" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>

  <!-- top eyebrow: thin, wide-tracked -->
  <line x1="360" y1="210" x2="460" y2="210" stroke="#c9a064" stroke-opacity="0.5"/>
  <text x="540" y="218" font-family="'Futura', 'Avenir Next', 'Century Gothic', 'Helvetica Neue', sans-serif" font-size="18" font-weight="300" letter-spacing="14" fill="#c9a064" text-anchor="middle">LAUNCHING  ·  MAY  2026</text>
  <line x1="620" y1="210" x2="720" y2="210" stroke="#c9a064" stroke-opacity="0.5"/>

  <!-- hero: editorial serif, light weights, high contrast -->
  <text x="540" y="560" font-family="'Didot', 'Bodoni Moda', 'Bodoni 72', 'Playfair Display', Georgia, serif" font-size="118" font-weight="300" fill="#ffffff" text-anchor="middle" letter-spacing="-1">It's finally</text>
  <text x="540" y="770" font-family="'Didot', 'Bodoni Moda', 'Bodoni 72', 'Playfair Display', Georgia, serif" font-style="italic" font-size="220" font-weight="400" fill="url(#gold)" text-anchor="middle" letter-spacing="-4">happening.</text>

  <!-- sub: lighter, airier -->
  <text x="540" y="950" font-family="'Futura', 'Avenir Next', 'Helvetica Neue', sans-serif" font-size="28" font-weight="300" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="1">The AI receptionist built only for</text>
  <text x="540" y="998" font-family="'Didot', 'Bodoni Moda', 'Playfair Display', Georgia, serif" font-style="italic" font-size="34" font-weight="400" fill="#ffffff" fill-opacity="0.92" text-anchor="middle" letter-spacing="0.5">barbers &amp; nail techs.</text>

  <!-- ornamental divider -->
  <line x1="460" y1="1130" x2="540" y2="1130" stroke="#c9a064" stroke-opacity="0.45"/>
  <circle cx="540" cy="1130" r="3" fill="#c9a064" fill-opacity="0.8"/>
  <line x1="540" y1="1130" x2="620" y2="1130" stroke="#c9a064" stroke-opacity="0.45"/>

  <!-- url: wide-tracked thin caps -->
  <text x="540" y="1240" font-family="'Futura', 'Avenir Next', 'Century Gothic', 'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="#c9a064" text-anchor="middle" letter-spacing="10">STYLEDESK.AI</text>

  <!-- tiny decorative dots -->
  <circle cx="200" cy="260" r="2" fill="#c9a064" fill-opacity="0.5"/>
  <circle cx="880" cy="320" r="2" fill="#f0c6cf" fill-opacity="0.4"/>
  <circle cx="160" cy="900" r="2" fill="#c9a064" fill-opacity="0.4"/>
  <circle cx="920" cy="1060" r="2" fill="#f0c6cf" fill-opacity="0.35"/>
</svg>
