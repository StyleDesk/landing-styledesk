<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img" aria-label="StyleDesk launches May 2026">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a0018"/>
      <stop offset="55%" stop-color="#2a0012"/>
      <stop offset="100%" stop-color="#1a000b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c6cf"/>
      <stop offset="50%" stop-color="#c9a064"/>
      <stop offset="100%" stop-color="#f0c6cf"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#c9a064" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7c1f36" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a064" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>

  <!-- top pill -->
  <rect x="360" y="170" width="360" height="56" rx="28" fill="none" stroke="#c9a064" stroke-opacity="0.35"/>
  <text x="540" y="207" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#c9a064" text-anchor="middle">LAUNCHING · MAY 2026</text>

  <!-- hero text -->
  <text x="540" y="540" font-family="'Inter', system-ui, sans-serif" font-size="108" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-3">It's finally</text>
  <text x="540" y="740" font-family="Georgia, 'Playfair Display', serif" font-style="italic" font-size="180" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="-4">happening.</text>

  <!-- sub -->
  <text x="540" y="880" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="400" fill="#ffffff" fill-opacity="0.6" text-anchor="middle">The AI receptionist built only for</text>
  <text x="540" y="922" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="600" fill="#ffffff" fill-opacity="0.85" text-anchor="middle">barbers &amp; nail techs.</text>
  <text x="540" y="982" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="400" fill="#ffffff" fill-opacity="0.45" text-anchor="middle">Goes live this month.</text>

  <!-- divider -->
  <line x1="420" y1="1080" x2="660" y2="1080" stroke="#c9a064" stroke-opacity="0.35" stroke-width="1"/>

  <!-- tagline -->
  <text x="540" y="1150" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="500" fill="#ffffff" fill-opacity="0.55" text-anchor="middle" letter-spacing="2">Every call. Every text. Handled.</text>

  <!-- url -->
  <text x="540" y="1240" font-family="'DM Mono', ui-monospace, monospace" font-size="28" font-weight="600" fill="#c9a064" text-anchor="middle" letter-spacing="2">styledesk.ai</text>

  <!-- tiny decorative dots -->
  <circle cx="200" cy="260" r="2" fill="#c9a064" fill-opacity="0.5"/>
  <circle cx="880" cy="320" r="2" fill="#f0c6cf" fill-opacity="0.4"/>
  <circle cx="160" cy="900" r="2" fill="#c9a064" fill-opacity="0.4"/>
  <circle cx="920" cy="1060" r="2" fill="#f0c6cf" fill-opacity="0.35"/>
  <circle cx="260" cy="1180" r="2" fill="#c9a064" fill-opacity="0.3"/>
</svg>
