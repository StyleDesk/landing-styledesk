<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img" aria-label="While you sleep — StyleDesk AI working overnight">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a0018"/>
      <stop offset="55%" stop-color="#2a0012"/>
      <stop offset="100%" stop-color="#1a000b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c6cf"/>
      <stop offset="50%" stop-color="#c9a064"/>
      <stop offset="100%" stop-color="#f0c6cf"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c9a064" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7c1f36" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a064" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>

  <!-- eyebrow -->
  <text x="540" y="210" font-family="'Helvetica Neue', 'Inter', -apple-system, 'SF Pro Display', sans-serif" font-size="20" font-weight="300" letter-spacing="4" fill="#c9a064" text-anchor="middle">THE NIGHT SHIFT</text>

  <!-- hero: single line, weight + color contrast -->
  <text x="540" y="540" font-family="'Helvetica Neue', 'Inter', -apple-system, 'SF Pro Display', sans-serif" font-size="115" text-anchor="middle" letter-spacing="-1"><tspan font-weight="200" fill="#ffffff">While you </tspan><tspan font-weight="500" fill="url(#gold)" font-style="italic">sleep.</tspan></text>

  <!-- timestamp rows: time (gold mono) + action (white light) -->
  <g font-size="28">
    <text x="250" y="730" font-family="'DM Mono', ui-monospace, monospace" font-weight="500" fill="#c9a064" fill-opacity="0.95">11:43 pm</text>
    <text x="440" y="730" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-weight="300" fill="#ffffff" fill-opacity="0.85">Texted Jake a booking link.</text>

    <text x="250" y="800" font-family="'DM Mono', ui-monospace, monospace" font-weight="500" fill="#c9a064" fill-opacity="0.95">2:17 am</text>
    <text x="440" y="800" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-weight="300" fill="#ffffff" fill-opacity="0.85">Sent Maria your shop's address.</text>

    <text x="250" y="870" font-family="'DM Mono', ui-monospace, monospace" font-weight="500" fill="#c9a064" fill-opacity="0.95">5:54 am</text>
    <text x="440" y="870" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-weight="300" fill="#ffffff" fill-opacity="0.85">Quoted a full set: $85.</text>
  </g>

  <!-- closer line -->
  <text x="540" y="1000" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-size="30" font-weight="500" fill="#ffffff" fill-opacity="0.92" text-anchor="middle" letter-spacing="0.3">That's what 24/7 looks like.</text>

  <!-- ornamental divider -->
  <line x1="470" y1="1135" x2="535" y2="1135" stroke="#c9a064" stroke-opacity="0.45"/>
  <circle cx="540" cy="1135" r="3" fill="#c9a064" fill-opacity="0.8"/>
  <line x1="545" y1="1135" x2="610" y2="1135" stroke="#c9a064" stroke-opacity="0.45"/>

  <!-- url -->
  <text x="540" y="1240" font-family="'Helvetica Neue', 'Inter', -apple-system, sans-serif" font-size="22" font-weight="300" fill="#c9a064" text-anchor="middle" letter-spacing="8">STYLEDESK.AI</text>
</svg>
