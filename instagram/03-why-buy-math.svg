<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img" aria-label="Missed calls cost six thousand a month">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a0018"/>
      <stop offset="55%" stop-color="#2a0012"/>
      <stop offset="100%" stop-color="#1a000b"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c6cf"/>
      <stop offset="50%" stop-color="#c9a064"/>
      <stop offset="100%" stop-color="#f0c6cf"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#7c1f36" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c1f36" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg3)"/>
  <rect width="1080" height="1350" fill="url(#redGlow)"/>

  <!-- eyebrow -->
  <text x="540" y="175" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="8" fill="#f0c6cf" fill-opacity="0.75" text-anchor="middle">THE COST OF MISSED CALLS</text>

  <!-- Pre-headline -->
  <text x="540" y="290" font-family="'Inter', system-ui, sans-serif" font-size="32" font-weight="500" fill="#ffffff" fill-opacity="0.6" text-anchor="middle">You're losing this much</text>
  <text x="540" y="338" font-family="'Inter', system-ui, sans-serif" font-size="32" font-weight="500" fill="#ffffff" fill-opacity="0.6" text-anchor="middle">every month:</text>

  <!-- big number -->
  <text x="540" y="620" font-family="'Inter', system-ui, sans-serif" font-size="280" font-weight="900" fill="url(#gold3)" text-anchor="middle" letter-spacing="-10">$6,000</text>

  <!-- math line -->
  <rect x="180" y="700" width="720" height="100" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="540" y="762" font-family="'DM Mono', ui-monospace, monospace" font-size="28" font-weight="500" fill="#ffffff" fill-opacity="0.75" text-anchor="middle">4 missed calls/day × $50 ticket × 30 days</text>

  <!-- rhetorical -->
  <text x="540" y="890" font-family="'Inter', system-ui, sans-serif" font-size="34" font-weight="400" fill="#ffffff" fill-opacity="0.7" text-anchor="middle">While you're in a fade, on a set,</text>
  <text x="540" y="938" font-family="'Inter', system-ui, sans-serif" font-size="34" font-weight="400" fill="#ffffff" fill-opacity="0.7" text-anchor="middle">or closed for the day —</text>
  <text x="540" y="995" font-family="'Inter', system-ui, sans-serif" font-size="38" font-weight="700" fill="#ffffff" text-anchor="middle">that client calls the next shop.</text>

  <!-- divider -->
  <line x1="380" y1="1070" x2="700" y2="1070" stroke="#c9a064" stroke-opacity="0.4"/>

  <!-- punchline -->
  <text x="540" y="1155" font-family="Georgia, 'Playfair Display', serif" font-style="italic" font-size="52" font-weight="700" fill="url(#gold3)" text-anchor="middle">StyleDesk is $49.</text>

  <text x="540" y="1220" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="500" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">Catches every call. Every text. 24/7.</text>

  <!-- url -->
  <text x="540" y="1300" font-family="'DM Mono', ui-monospace, monospace" font-size="22" font-weight="600" fill="#c9a064" fill-opacity="0.8" text-anchor="middle" letter-spacing="2">styledesk.ai</text>
</svg>
