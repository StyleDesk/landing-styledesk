<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img" aria-label="StyleDesk price comparison">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a0018"/>
      <stop offset="55%" stop-color="#2a0012"/>
      <stop offset="100%" stop-color="#1a000b"/>
    </linearGradient>
    <linearGradient id="gold4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c6cf"/>
      <stop offset="50%" stop-color="#c9a064"/>
      <stop offset="100%" stop-color="#f0c6cf"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="72%" r="50%">
      <stop offset="0%" stop-color="#c9a064" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c9a064" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg4)"/>
  <rect width="1080" height="1350" fill="url(#goldGlow)"/>

  <!-- eyebrow -->
  <text x="540" y="170" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="8" fill="#c9a064" text-anchor="middle">DO THE MATH</text>

  <!-- title -->
  <text x="540" y="280" font-family="'Inter', system-ui, sans-serif" font-size="62" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">You can pay</text>
  <text x="540" y="354" font-family="'Inter', system-ui, sans-serif" font-size="62" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">someone to answer.</text>
  <text x="540" y="428" font-family="Georgia, 'Playfair Display', serif" font-style="italic" font-size="58" font-weight="700" fill="url(#gold4)" text-anchor="middle" letter-spacing="-1">Or pay $49.</text>

  <!-- comparison cards -->
  <!-- row 1: human -->
  <g>
    <rect x="90" y="520" width="900" height="130" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="130" y="575" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="600" fill="#ffffff" fill-opacity="0.85">Human answering service</text>
    <text x="130" y="615" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="400" fill="#ffffff" fill-opacity="0.45">Sleeps. Misses texts. Reads a script.</text>
    <text x="950" y="605" font-family="'Inter', system-ui, sans-serif" font-size="36" font-weight="700" fill="#ff8e9b" text-anchor="end">$500–2,500/mo</text>
  </g>

  <!-- row 2: generic AI -->
  <g>
    <rect x="90" y="680" width="900" height="130" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="130" y="735" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="600" fill="#ffffff" fill-opacity="0.85">Generic AI voice API</text>
    <text x="130" y="775" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="400" fill="#ffffff" fill-opacity="0.45">Per-minute + per-text. Weeks of setup.</text>
    <text x="950" y="765" font-family="'Inter', system-ui, sans-serif" font-size="36" font-weight="700" fill="#ff8e9b" text-anchor="end">$100–600/mo</text>
  </g>

  <!-- row 3: StyleDesk (highlighted) -->
  <g>
    <rect x="80" y="840" width="920" height="150" rx="20" fill="#c9a064" fill-opacity="0.12" stroke="#c9a064" stroke-opacity="0.6" stroke-width="2"/>
    <text x="130" y="895" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="700" fill="#ffffff">StyleDesk</text>
    <text x="130" y="940" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="400" fill="#ffffff" fill-opacity="0.6">Built for barbers &amp; nail techs. Setup in 15 min.</text>
    <text x="960" y="930" font-family="'Inter', system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#gold4)" text-anchor="end">$49/mo</text>
  </g>

  <!-- bottom -->
  <text x="540" y="1120" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="600" fill="#ffffff" text-anchor="middle">Flat pricing. No per-minute math.</text>
  <text x="540" y="1170" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="400" fill="#ffffff" fill-opacity="0.55" text-anchor="middle">14-day free trial. Cancel anytime.</text>

  <text x="540" y="1265" font-family="'DM Mono', ui-monospace, monospace" font-size="24" font-weight="600" fill="#c9a064" text-anchor="middle" letter-spacing="2">styledesk.ai</text>
</svg>
